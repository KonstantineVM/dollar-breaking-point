<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>该页面不存在</title>
<meta name=viewport content="width=device-width, minimum-scale=1.0, maximum-scale=1.0" />
<!--
<meta http-equiv="refresh" content="5;url=/" />
-->
<link rel="stylesheet" href="/error/css/404.css">
<link rel="stylesheet" href="/aidao.css">

</head>
<body>
<div class="logo_l"><img src="/error/images/logo_03.png" /></div>
<div class="auto">
	<div class="container">
		<div class="settings">
			<!--  <p class="icon">404</p> -->
			<h4>很抱歉！没有找到您要访问的页面！</h4> 
			<p><span id="num"></span> 秒后将自动跳转到首页</p>
			<div>
				<a href="/" title="返回首页" class="first-child">返回首页</a>
				<a href="#" title="上一步" onclick="history.back()">上一步</a>
			</div>
            <div style="clear:both;"></div>
		</div>
	</div>
</div>
<script>
function setTime(count){
	if(count == 0){
		location = "/";
	}
	document.getElementById("num").innerHTML=count;
	count--;
	setTimeout(function(){
        	setTime(count);
	},1000);
}
setTime(10);
</script>
</body>
</html>
